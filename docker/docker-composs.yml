version: '3.8'

services:

  # ============================================================
  # OLLAMA — Local AI inference
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: valkyrie-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    # GPU support — uncomment if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ============================================================
  # MODEL PULLER — Pulls qwen3-coder:30b on first launch
  # ============================================================
  ollama-pull:
    image: ollama/ollama:latest
    container_name: valkyrie-ollama-pull
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to start...';
        sleep 10;
        ollama pull ${OLLAMA_MODEL:-qwen3-coder:30b};
        echo 'Model ready.';
      "
    restart: "no"

  # ============================================================
  # NGINX — Serves dashboard + proxies API and Ollama
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: valkyrie-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../index.html:/usr/share/nginx/html/valkyrie/index.html:ro
    depends_on:
      - ollama
    environment:
      - TRADING_FORGE_URL=${TRADING_FORGE_URL:-http://host.docker.internal:8000}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}

volumes:
  ollama_data:
    driver: local
